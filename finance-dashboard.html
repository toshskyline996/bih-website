<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Management - Gas Station Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #141414;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: #1c1c1c;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 20px 25px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #ffffff;
            font-size: 24px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 9px 18px;
            border: none;
            border-radius: 8px;
            background: #FFD100;
            color: #000000;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: #E5BC00;
        }

        .nav-btn.secondary {
            background: #2a2a2a;
            color: #a8a8a8;
            border: 1px solid #3a3a3a;
        }

        .nav-btn.secondary:hover {
            background: #333333;
            color: #ffffff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #1c1c1c;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 24px;
            transition: background 0.2s;
        }

        .stat-card:hover {
            background: #242424;
        }

        .stat-card.positive {
            border-left: 5px solid #FFD100;
        }

        .stat-card.negative {
            border-left: 5px solid #FF6B6B;
        }

        .stat-card.neutral {
            border-left: 5px solid #a0a0a0;
        }

        .stat-label {
            color: #6b6b6b;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .stat-change {
            font-size: 13px;
        }

        .stat-change.positive {
            color: #FFD100;
        }

        .stat-change.negative {
            color: #FF6B6B;
        }

        .section {
            background: #1c1c1c;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .section h2 {
            color: #ffffff;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #2a2a2a;
            background: #0d0d0d;
            font-weight: 600;
            color: #6b6b6b;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #2a2a2a;
            color: #ffffff;
            font-size: 14px;
        }

        tr:hover td {
            background: #242424;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge.credit {
            background: rgba(255, 209, 0, 0.10);
            color: #FFD100;
        }

        .badge.debit {
            background: rgba(255, 107, 107, 0.10);
            color: #FF6B6B;
        }

        .badge.overdue {
            background: rgba(255, 107, 107, 0.10);
            color: #FF6B6B;
        }

        .badge.paid {
            background: rgba(255, 209, 0, 0.10);
            color: #FFD100;
        }

        .badge.unpaid {
            background: rgba(255, 165, 0, 0.10);
            color: #FFA500;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #6b6b6b;
        }

        .spinner {
            border: 4px solid #2a2a2a;
            border-top: 4px solid #FFD100;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 107, 107, 0.08);
            border-left: 4px solid #FF6B6B;
            color: #FF6B6B;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>💰 Finance Management Dashboard</h1>
            <div class="nav-buttons">
                <a href="/dashboard" class="nav-btn">📊 Shift Reports</a>
                <a href="/fuel-dashboard.html" class="nav-btn">⛽ Fuel Management</a>
                <a href="/auth/logout" class="nav-btn secondary">Logout</a>
            </div>
        </div>

        <!-- Financial Summary -->
        <div id="summaryContainer" class="loading">
            <div class="spinner"></div>
            <p>Loading financial summary...</p>
        </div>

        <!-- Recent Transactions -->
        <div class="section">
            <h2>💳 Recent Transactions</h2>
            <div id="transactionsContainer" class="loading">
                <div class="spinner"></div>
                <p>Loading transactions...</p>
            </div>
        </div>

        <!-- Accounts Payable -->
        <div class="section">
            <h2>📋 Accounts Payable</h2>
            <div id="payablesContainer" class="loading">
                <div class="spinner"></div>
                <p>Loading accounts payable...</p>
            </div>
        </div>
    </div>

    <script>
        // Get token from URL or localStorage
        const urlParams = new URLSearchParams(window.location.search);
        let token = urlParams.get('token') || localStorage.getItem('token');

        if (!token) {
            window.location.href = '/login';
        } else {
            localStorage.setItem('token', token);
        }

        // API call helper
        async function apiCall(endpoint) {
            const response = await fetch(endpoint, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (response.status === 401) {
                localStorage.removeItem('token');
                window.location.href = '/login?error=session_expired';
                return null;
            }

            if (!response.ok) {
                throw new Error(`API call failed: ${response.statusText}`);
            }

            return await response.json();
        }

        // Format currency
        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD'
            }).format(amount);
        }

        // Load financial summary
        async function loadSummary() {
            try {
                const data = await apiCall('/api/finance/summary?days=30');

                if (!data || !data.summary) {
                    throw new Error('Invalid response from server');
                }

                const summary = data.summary;

                const summaryHtml = `
                    <div class="stats-grid">
                        <div class="stat-card positive">
                            <div class="stat-label">Total Revenue (30 days)</div>
                            <div class="stat-value">${formatCurrency(summary.revenue.total)}</div>
                            <div class="stat-change positive">
                                Fuel: ${formatCurrency(summary.revenue.fuel)} | Store: ${formatCurrency(summary.revenue.store)}
                            </div>
                        </div>

                        <div class="stat-card negative">
                            <div class="stat-label">Total Expenses (30 days)</div>
                            <div class="stat-value">${formatCurrency(summary.expenses.total)}</div>
                            <div class="stat-change negative">
                                Fuel: ${formatCurrency(summary.expenses.fuel_purchases)} | Operating: ${formatCurrency(summary.expenses.operating)}
                            </div>
                        </div>

                        <div class="stat-card ${summary.profit.gross >= 0 ? 'positive' : 'negative'}">
                            <div class="stat-label">Gross Profit</div>
                            <div class="stat-value">${formatCurrency(summary.profit.gross)}</div>
                            <div class="stat-change ${summary.profit.gross >= 0 ? 'positive' : 'negative'}">
                                Margin: ${summary.profit.margin}%
                            </div>
                        </div>

                        <div class="stat-card neutral">
                            <div class="stat-label">Outstanding Payables</div>
                            <div class="stat-value">${formatCurrency(summary.accounts_payable?.total_outstanding || 0)}</div>
                            <div class="stat-change ${(summary.accounts_payable?.overdue_count || 0) > 0 ? 'negative' : 'positive'}">
                                ${summary.accounts_payable?.overdue_count || 0} overdue invoices
                            </div>
                        </div>
                    </div>
                `;

                document.getElementById('summaryContainer').innerHTML = summaryHtml;

            } catch (error) {
                console.error('Error loading summary:', error);
                document.getElementById('summaryContainer').innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> Failed to load financial summary. ${error.message}
                    </div>
                `;
            }
        }

        // Load recent transactions
        async function loadTransactions() {
            try {
                const data = await apiCall('/api/finance/transactions?limit=10');

                if (!data || !data.transactions) {
                    throw new Error('Invalid response from server');
                }

                if (data.transactions.length === 0) {
                    document.getElementById('transactionsContainer').innerHTML = `
                        <p style="text-align: center; color: #666; padding: 20px;">
                            No transaction records found.
                        </p>
                    `;
                    return;
                }

                const tableHtml = `
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Type</th>
                                    <th>Amount</th>
                                    <th>Category</th>
                                    <th>Description</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.transactions.map(t => `
                                    <tr>
                                        <td>${t.transaction_date}</td>
                                        <td><span class="badge ${t.transaction_type.toLowerCase()}">${t.transaction_type}</span></td>
                                        <td style="font-weight: bold; color: ${t.transaction_type === 'CREDIT' ? '#FFD100' : '#FF6B6B'};">
                                            ${t.transaction_type === 'CREDIT' ? '+' : '-'}${formatCurrency(t.amount)}
                                        </td>
                                        <td>${t.category || '-'}</td>
                                        <td>${t.description || '-'}</td>
                                        <td>${t.status}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;

                document.getElementById('transactionsContainer').innerHTML = tableHtml;

            } catch (error) {
                console.error('Error loading transactions:', error);
                document.getElementById('transactionsContainer').innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> Failed to load transactions. ${error.message}
                    </div>
                `;
            }
        }

        // Load accounts payable
        async function loadPayables() {
            try {
                const data = await apiCall('/api/finance/payables?status=UNPAID');

                if (!data || !data.payables) {
                    throw new Error('Invalid response from server');
                }

                if (data.payables.length === 0) {
                    document.getElementById('payablesContainer').innerHTML = `
                        <p style="text-align: center; color: #666; padding: 20px;">
                            No unpaid invoices found. Great job keeping up with payments!
                        </p>
                    `;
                    return;
                }

                const tableHtml = `
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Supplier</th>
                                    <th>Invoice #</th>
                                    <th>Invoice Date</th>
                                    <th>Due Date</th>
                                    <th>Amount Owed</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.payables.map(p => {
                                    const isOverdue = new Date(p.due_date) < new Date();
                                    return `
                                        <tr style="${isOverdue ? 'background: rgba(255, 165, 0, 0.06);' : ''}">
                                            <td>${p.supplier_name || 'N/A'}</td>
                                            <td>${p.invoice_number}</td>
                                            <td>${p.invoice_date}</td>
                                            <td>${p.due_date} ${isOverdue ? '⚠️' : ''}</td>
                                            <td style="font-weight: bold;">${formatCurrency(p.remaining_amount)}</td>
                                            <td><span class="badge ${p.status.toLowerCase()}">${p.status}</span></td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;

                document.getElementById('payablesContainer').innerHTML = tableHtml;

            } catch (error) {
                console.error('Error loading payables:', error);
                document.getElementById('payablesContainer').innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> Failed to load accounts payable. ${error.message}
                    </div>
                `;
            }
        }

        // Load data on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadSummary();
            loadTransactions();
            loadPayables();

            // Refresh every 5 minutes
            setInterval(() => {
                loadSummary();
                loadTransactions();
                loadPayables();
            }, 5 * 60 * 1000);
        });
    </script>
</body>
</html>
