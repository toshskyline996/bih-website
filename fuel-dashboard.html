<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Management - Gas Station Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #141414;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: #1c1c1c;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 20px 25px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #ffffff;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 9px 18px;
            border: none;
            border-radius: 8px;
            background: #FFD100;
            color: #000000;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: #E5BC00;
        }

        .nav-btn.secondary {
            background: #2a2a2a;
            color: #a8a8a8;
            border: 1px solid #3a3a3a;
        }

        .nav-btn.secondary:hover {
            background: #333333;
            color: #ffffff;
        }

        .alert {
            background: rgba(255, 165, 0, 0.08);
            border-left: 4px solid #FFA500;
            color: #FFA500;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert.critical {
            background: rgba(255, 107, 107, 0.08);
            border-left-color: #FF6B6B;
            color: #FF6B6B;
        }

        .tanks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .tank-card {
            background: #1c1c1c;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            transition: background 0.2s;
        }

        .tank-card:hover {
            background: #222222;
        }

        .tank-card.critical {
            border: 2px solid #FF6B6B;
        }

        .tank-card.low {
            border: 2px solid #FFA500;
        }

        .tank-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .tank-name {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
        }

        .fuel-type {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .fuel-type.REGULAR {
            background: rgba(255, 209, 0, 0.10);
            color: #FFD100;
        }

        .fuel-type.PLUS {
            background: rgba(255, 165, 0, 0.10);
            color: #FFA500;
        }

        .fuel-type.PREMIUM {
            background: rgba(255, 107, 107, 0.10);
            color: #FF6B6B;
        }

        .fuel-type.DIESEL {
            background: rgba(100, 200, 130, 0.10);
            color: #64C882;
        }

        .tank-info {
            margin-bottom: 15px;
        }

        .tank-info p {
            color: #a8a8a8;
            font-size: 14px;
            margin: 5px 0;
        }

        .tank-info p strong {
            color: #d0d0d0;
        }

        .progress-container {
            background: #2a2a2a;
            border-radius: 10px;
            height: 28px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 100%;
            background: #FFD100;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000000;
            font-weight: bold;
            font-size: 13px;
            transition: width 0.5s ease;
        }

        .progress-bar.low {
            background: #FFA500;
            color: #000000;
        }

        .progress-bar.critical {
            background: #FF4444;
            color: #ffffff;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-badge.OK {
            background: rgba(255, 209, 0, 0.10);
            color: #FFD100;
        }

        .status-badge.LOW {
            background: rgba(255, 165, 0, 0.10);
            color: #FFA500;
        }

        .status-badge.CRITICAL {
            background: rgba(255, 107, 107, 0.10);
            color: #FF6B6B;
        }

        .tank-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-primary {
            background: #FFD100;
            color: #000000;
        }

        .btn-primary:hover {
            background: #E5BC00;
        }

        .btn-secondary {
            background: #2a2a2a;
            color: #a8a8a8;
            border: 1px solid #3a3a3a;
        }

        .btn-secondary:hover {
            background: #333333;
            color: #ffffff;
        }

        .section {
            background: #1c1c1c;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .section h2 {
            color: #ffffff;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .deliveries-table {
            width: 100%;
            border-collapse: collapse;
        }

        .deliveries-table th {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #2a2a2a;
            background: #0d0d0d;
            font-weight: 600;
            color: #6b6b6b;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .deliveries-table td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #2a2a2a;
            color: #ffffff;
            font-size: 14px;
        }

        .deliveries-table tr:hover td {
            background: #242424;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #6b6b6b;
        }

        .spinner {
            border: 4px solid #2a2a2a;
            border-top: 4px solid #FFD100;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 107, 107, 0.08);
            border-left: 4px solid #FF6B6B;
            color: #FF6B6B;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .tanks-grid {
                grid-template-columns: 1fr;
            }

            .tank-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>⛽ Fuel Management Dashboard</h1>
            <div class="nav-buttons">
                <a href="/dashboard" class="nav-btn">📊 Shift Reports</a>
                <a href="/finance-dashboard.html" class="nav-btn">💰 Finance</a>
                <a href="/auth/logout" class="nav-btn secondary">Logout</a>
            </div>
        </div>

        <!-- Critical Alerts -->
        <div id="alertsContainer"></div>

        <!-- Fuel Tanks -->
        <div id="tanksContainer" class="loading">
            <div class="spinner"></div>
            <p>Loading fuel tanks...</p>
        </div>

        <!-- Recent Deliveries -->
        <div class="section">
            <h2>📦 Recent Fuel Deliveries</h2>
            <div id="deliveriesContainer" class="loading">
                <div class="spinner"></div>
                <p>Loading deliveries...</p>
            </div>
        </div>
    </div>

    <script>
        // Get token from URL or localStorage
        const urlParams = new URLSearchParams(window.location.search);
        let token = urlParams.get('token') || localStorage.getItem('token');

        if (!token) {
            window.location.href = '/login';
        } else {
            localStorage.setItem('token', token);
        }

        // API call helper
        async function apiCall(endpoint) {
            const response = await fetch(endpoint, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (response.status === 401) {
                localStorage.removeItem('token');
                window.location.href = '/login?error=session_expired';
                return null;
            }

            if (!response.ok) {
                throw new Error(`API call failed: ${response.statusText}`);
            }

            return await response.json();
        }

        // Format currency
        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD'
            }).format(amount);
        }

        // Load fuel tanks
        async function loadTanks() {
            try {
                const data = await apiCall('/api/fuel/tanks');

                if (!data || !data.tanks) {
                    throw new Error('Invalid response from server');
                }

                const tanks = data.tanks;

                // Show critical alerts
                const criticalTanks = tanks.filter(t => t.status === 'CRITICAL');
                const lowTanks = tanks.filter(t => t.status === 'LOW');

                if (criticalTanks.length > 0 || lowTanks.length > 0) {
                    showAlerts(criticalTanks, lowTanks);
                }

                // Render tanks
                const tanksHtml = tanks.map(tank => `
                    <div class="tank-card ${tank.status.toLowerCase()}">
                        <div class="tank-header">
                            <div>
                                <div class="tank-name">${tank.tank_name}</div>
                                <div style="color: #666; font-size: 12px; margin-top: 5px;">
                                    ${tank.tank_code}
                                </div>
                            </div>
                            <span class="fuel-type ${tank.fuel_type}">${tank.fuel_type}</span>
                        </div>

                        <div class="tank-info">
                            <p><strong>Capacity:</strong> ${tank.capacity.toLocaleString()} L</p>
                            <p><strong>Current Level:</strong> ${tank.current_level.toLocaleString()} L</p>
                        </div>

                        <div class="progress-container">
                            <div class="progress-bar ${tank.status.toLowerCase()}"
                                 style="width: ${tank.percentage}%">
                                ${tank.percentage}%
                            </div>
                        </div>

                        <div style="margin-bottom: 10px;">
                            <span class="status-badge ${tank.status}">${tank.status}</span>
                        </div>

                        <div class="tank-actions">
                            <button class="btn btn-primary" onclick="viewOrderRecommendation(${tank.id})">
                                📦 Order Recommendation
                            </button>
                            <button class="btn btn-secondary" onclick="viewTankDetails(${tank.id})">
                                📊 Details
                            </button>
                        </div>
                    </div>
                `).join('');

                document.getElementById('tanksContainer').innerHTML =
                    `<div class="tanks-grid">${tanksHtml}</div>`;

            } catch (error) {
                console.error('Error loading tanks:', error);
                document.getElementById('tanksContainer').innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> Failed to load fuel tanks. ${error.message}
                    </div>
                `;
            }
        }

        // Show alerts
        function showAlerts(criticalTanks, lowTanks) {
            let alertsHtml = '';

            if (criticalTanks.length > 0) {
                alertsHtml += `
                    <div class="alert critical show">
                        <strong>🚨 CRITICAL ALERT!</strong> The following tanks are critically low:
                        <ul style="margin: 10px 0 0 20px;">
                            ${criticalTanks.map(t => `
                                <li>${t.tank_name}: ${t.current_level.toLocaleString()}L / ${t.capacity.toLocaleString()}L (${t.percentage}%)</li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }

            if (lowTanks.length > 0) {
                alertsHtml += `
                    <div class="alert show">
                        <strong>⚠️ Low Inventory Warning:</strong> The following tanks are running low:
                        <ul style="margin: 10px 0 0 20px;">
                            ${lowTanks.map(t => `
                                <li>${t.tank_name}: ${t.current_level.toLocaleString()}L / ${t.capacity.toLocaleString()}L (${t.percentage}%)</li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }

            document.getElementById('alertsContainer').innerHTML = alertsHtml;
        }

        // Load recent deliveries
        async function loadDeliveries() {
            try {
                const data = await apiCall('/api/fuel/deliveries?limit=10');

                if (!data || !data.deliveries) {
                    throw new Error('Invalid response from server');
                }

                if (data.deliveries.length === 0) {
                    document.getElementById('deliveriesContainer').innerHTML = `
                        <p style="text-align: center; color: #666; padding: 20px;">
                            No delivery records found.
                        </p>
                    `;
                    return;
                }

                const tableHtml = `
                    <table class="deliveries-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Tank</th>
                                <th>Fuel Type</th>
                                <th>Quantity (L)</th>
                                <th>Price/L</th>
                                <th>Total Cost</th>
                                <th>Supplier</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.deliveries.map(d => `
                                <tr>
                                    <td>${d.delivery_date}</td>
                                    <td>${d.tank_name}</td>
                                    <td><span class="fuel-type ${d.fuel_type}">${d.fuel_type}</span></td>
                                    <td>${d.quantity.toLocaleString()}</td>
                                    <td>${formatCurrency(d.unit_price)}</td>
                                    <td>${formatCurrency(d.total_amount)}</td>
                                    <td>${d.supplier_name || '-'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;

                document.getElementById('deliveriesContainer').innerHTML = tableHtml;

            } catch (error) {
                console.error('Error loading deliveries:', error);
                document.getElementById('deliveriesContainer').innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> Failed to load deliveries. ${error.message}
                    </div>
                `;
            }
        }

        // View order recommendation
        async function viewOrderRecommendation(tankId) {
            try {
                const data = await apiCall(`/api/fuel/tanks/${tankId}/order-recommendation`);

                if (!data || !data.recommendation) {
                    alert('Failed to get order recommendation');
                    return;
                }

                const rec = data.recommendation;

                alert(`
📦 ORDER RECOMMENDATION

Tank: ${rec.tank_name}
Fuel Type: ${rec.fuel_type}

Current Level: ${rec.current_level.toLocaleString()} L
Capacity: ${rec.capacity.toLocaleString()} L

Average Daily Sales: ${rec.avg_daily_sales.toLocaleString()} L/day
Days Until Empty: ${rec.days_until_empty} days

RECOMMENDED ORDER: ${rec.recommended_order.toLocaleString()} L

(Based on 3-day projected sales + 10% safety stock)
                `.trim());

            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // View tank details
        function viewTankDetails(tankId) {
            alert(`Tank details view coming soon! Tank ID: ${tankId}`);
        }

        // Load data on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadTanks();
            loadDeliveries();

            // Refresh every 5 minutes
            setInterval(() => {
                loadTanks();
                loadDeliveries();
            }, 5 * 60 * 1000);
        });
    </script>
</body>
</html>
