<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Gas Station Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #141414;
            color: #ffffff;
        }

        /* Header */
        .header {
            background: #1c1c1c;
            border-bottom: 1px solid #2a2a2a;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-name {
            font-size: 14px;
            color: #a8a8a8;
        }

        .logout-btn {
            padding: 8px 16px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #d32f2f;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #1c1c1c;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 24px;
            transition: background 0.2s;
        }

        .stat-card:hover {
            background: #242424;
        }

        .stat-card h3 {
            font-size: 14px;
            color: #6b6b6b;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .stat-card .subtitle {
            font-size: 13px;
            color: #a8a8a8;
        }

        .stat-card.blue  { border-left: 4px solid #FFD100; }
        .stat-card.green { border-left: 4px solid #FFD100; }
        .stat-card.orange { border-left: 4px solid #FFD100; }
        .stat-card.purple { border-left: 4px solid #FFD100; }

        /* Reports Table */
        .reports-section {
            background: #1c1c1c;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 24px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            font-size: 20px;
            color: #ffffff;
        }

        .filter-controls {
            display: flex;
            gap: 12px;
        }

        .filter-controls select,
        .filter-controls input {
            padding: 8px 12px;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            font-size: 14px;
            background: #242424;
            color: #ffffff;
        }

        .filter-controls select option {
            background: #242424;
            color: #ffffff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #0d0d0d;
            padding: 12px;
            text-align: left;
            font-size: 13px;
            color: #6b6b6b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px 12px;
            border-bottom: 1px solid #2a2a2a;
            font-size: 14px;
            color: #ffffff;
        }

        tr:hover td {
            background: #242424;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-ok {
            background: rgba(255, 209, 0, 0.10);
            color: #FFD100;
        }

        .status-low {
            background: rgba(255, 165, 0, 0.10);
            color: #FFA500;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #6b6b6b;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #2a2a2a;
            border-top: 4px solid #FFD100;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
        }

        .pagination button {
            padding: 8px 16px;
            border: 1px solid #3a3a3a;
            background: #1c1c1c;
            color: #a8a8a8;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            background: #FFD100;
            color: #000000;
            border-color: #FFD100;
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pagination button.active {
            background: #FFD100;
            color: #000000;
            border-color: #FFD100;
            font-weight: 600;
        }

        .pagination span {
            color: #a8a8a8;
            font-size: 14px;
            padding: 8px 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <span>⛽</span>
            <span>Gas Station Admin Dashboard</span>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <a href="/fuel-dashboard.html" style="padding: 8px 16px; background: #FFD100; color: #000000; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 600;">
                ⛽ Fuel Management
            </a>
            <a href="/finance-dashboard.html" style="padding: 8px 16px; background: #E5BC00; color: #000000; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 600;">
                💰 Finance
            </a>
            <div class="user-info">
                <img id="userAvatar" class="user-avatar" src="" alt="User">
                <span class="user-name" id="userName"></span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card blue">
                <h3>Total Reports</h3>
                <div class="value" id="totalReports">0</div>
                <div class="subtitle">All time</div>
            </div>
            <div class="stat-card green">
                <h3>Total Sales</h3>
                <div class="value" id="totalSales">$0</div>
                <div class="subtitle">Last 30 days</div>
            </div>
            <div class="stat-card orange">
                <h3>Fuel Sales</h3>
                <div class="value" id="fuelSales">$0</div>
                <div class="subtitle">Last 30 days</div>
            </div>
            <div class="stat-card purple">
                <h3>Avg per Shift</h3>
                <div class="value" id="avgSales">$0</div>
                <div class="subtitle">Last 30 days</div>
            </div>
        </div>

        <!-- Reports Table -->
        <div class="reports-section">
            <div class="section-header">
                <h2>Recent Shift Reports</h2>
                <div class="filter-controls">
                    <input type="date" id="dateFilter" onchange="loadReports()">
                    <select id="shiftFilter" onchange="loadReports()">
                        <option value="">All Shifts</option>
                        <option value="1">Shift 1</option>
                        <option value="2">Shift 2</option>
                        <option value="3">Shift 3</option>
                    </select>
                </div>
            </div>

            <div id="loadingContainer" class="loading">
                <div class="loading-spinner"></div>
                <div>Loading shift reports...</div>
            </div>

            <div id="tableContainer" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Shift</th>
                            <th>Employee</th>
                            <th>Total Sales</th>
                            <th>Fuel Sales</th>
                            <th>Inventory</th>
                            <th>OCR Engine</th>
                        </tr>
                    </thead>
                    <tbody id="reportsTableBody">
                    </tbody>
                </table>

                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>

    <script>
        let token = null;
        let currentPage = 1;

        // Get token from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');

        if (urlToken) {
            token = urlToken;
            localStorage.setItem('authToken', token);
            // Remove token from URL
            window.history.replaceState({}, document.title, '/dashboard');
        } else {
            token = localStorage.getItem('authToken');
        }

        if (!token) {
            window.location.href = '/login';
        }

        // Load user info
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/auth/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load user info');
                }

                const user = await response.json();
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userAvatar').src = user.picture || '/default-avatar.png';
            } catch (error) {
                console.error('Error loading user info:', error);
                window.location.href = '/login';
            }
        }

        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch('/api/stats', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load stats');
                }

                const stats = await response.json();

                document.getElementById('totalReports').textContent = stats.total_reports;
                document.getElementById('totalSales').textContent = formatCurrency(stats.sales_summary?.total_sales || 0);
                document.getElementById('fuelSales').textContent = formatCurrency(stats.sales_summary?.total_fuel_sales || 0);
                document.getElementById('avgSales').textContent = formatCurrency(stats.sales_summary?.avg_sales_per_shift || 0);
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Load shift reports
        async function loadReports(page = 1) {
            currentPage = page;

            try {
                const response = await fetch(`/api/shift-reports?page=${page}&limit=20`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load reports');
                }

                const data = await response.json();

                document.getElementById('loadingContainer').style.display = 'none';
                document.getElementById('tableContainer').style.display = 'block';

                renderReports(data.reports);
                renderPagination(data.pagination);
            } catch (error) {
                console.error('Error loading reports:', error);
                document.getElementById('loadingContainer').innerHTML =
                    '<p style="color: #f44336;">Failed to load reports. Please try again.</p>';
            }
        }

        // Render reports table
        function renderReports(reports) {
            const tbody = document.getElementById('reportsTableBody');
            tbody.innerHTML = '';

            reports.forEach(report => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${formatDate(report.date)}</td>
                    <td>Shift ${report.shift_number}</td>
                    <td>${report.employee_name || 'N/A'}</td>
                    <td>${formatCurrency(report.total_sales)}</td>
                    <td>${formatCurrency(report.fuel_sales)}</td>
                    <td>
                        <span class="status-badge ${report.inventory_status === 'OK' ? 'status-ok' : 'status-low'}">
                            ${report.inventory_status || 'N/A'}
                        </span>
                    </td>
                    <td>${report.ocr_engine || 'N/A'}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Render pagination
        function renderPagination(pagination) {
            const container = document.getElementById('pagination');
            container.innerHTML = '';

            // Previous button
            const prevBtn = document.createElement('button');
            prevBtn.textContent = '← Previous';
            prevBtn.disabled = pagination.page === 1;
            prevBtn.onclick = () => loadReports(pagination.page - 1);
            container.appendChild(prevBtn);

            // Page info
            const pageInfo = document.createElement('span');
            pageInfo.textContent = `Page ${pagination.page} of ${pagination.totalPages}`;
            pageInfo.style.padding = '8px 16px';
            container.appendChild(pageInfo);

            // Next button
            const nextBtn = document.createElement('button');
            nextBtn.textContent = 'Next →';
            nextBtn.disabled = pagination.page === pagination.totalPages;
            nextBtn.onclick = () => loadReports(pagination.page + 1);
            container.appendChild(nextBtn);
        }

        // Utility functions
        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD'
            }).format(amount || 0);
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        function logout() {
            localStorage.removeItem('authToken');
            window.location.href = '/auth/logout';
        }

        // Initialize dashboard
        loadUserInfo();
        loadStats();
        loadReports();
    </script>
</body>
</html>
